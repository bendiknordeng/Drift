name: Release Apple Silicon PKG

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and release Apple Silicon package
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show build environment
        run: |
          sw_vers
          uname -m
          xcodebuild -version
          swift --version

      - name: Resolve release metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          else
            VERSION="${{ inputs.version }}"
            VERSION="${VERSION#v}"
            TAG="v${VERSION}"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "pkg_name=Drift-${VERSION}-arm64.pkg" >> "$GITHUB_OUTPUT"

      - name: Build pkg
        env:
          VERSION: ${{ steps.metadata.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
          ARCH: arm64
        run: |
          chmod +x scripts/package-macos.sh
          scripts/package-macos.sh

      - name: Upload pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.pkg_name }}
          path: dist/${{ steps.metadata.outputs.pkg_name }}
          if-no-files-found: error

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.metadata.outputs.tag }}
          PKG_PATH: dist/${{ steps.metadata.outputs.pkg_name }}
        run: |
          set -euo pipefail

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$PKG_PATH" --clobber
          else
            gh release create "$TAG" "$PKG_PATH" \
              --target "$GITHUB_SHA" \
              --title "Drift $TAG" \
              --generate-notes
          fi
