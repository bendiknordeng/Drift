name: Release Apple Silicon PKG

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and release Apple Silicon package
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show build environment
        run: |
          sw_vers
          uname -m
          xcodebuild -version
          swift --version

      - name: Resolve release metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          else
            VERSION="${{ inputs.version }}"
            VERSION="${VERSION#v}"
            TAG="v${VERSION}"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "pkg_name=Drift-${VERSION}-arm64.pkg" >> "$GITHUB_OUTPUT"

      - name: Preflight signing secrets
        env:
          APPLE_DEVELOPER_ID_APP_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERTIFICATE_BASE64 }}
          APPLE_DEVELOPER_ID_APP_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERTIFICATE_PASSWORD }}
          APPLE_DEVELOPER_ID_INSTALLER_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_CERTIFICATE_BASE64 }}
          APPLE_DEVELOPER_ID_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_CERTIFICATE_PASSWORD }}
          APPLE_DEVELOPER_ID_APP_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}
          APPLE_DEVELOPER_ID_INSTALLER_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_IDENTITY }}
          APPLE_NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail

          missing=()
          for name in \
            APPLE_DEVELOPER_ID_APP_CERTIFICATE_BASE64 \
            APPLE_DEVELOPER_ID_APP_CERTIFICATE_PASSWORD \
            APPLE_DEVELOPER_ID_INSTALLER_CERTIFICATE_BASE64 \
            APPLE_DEVELOPER_ID_INSTALLER_CERTIFICATE_PASSWORD \
            APPLE_DEVELOPER_ID_APP_IDENTITY \
            APPLE_DEVELOPER_ID_INSTALLER_IDENTITY \
            APPLE_NOTARY_KEY_BASE64 \
            APPLE_NOTARY_KEY_ID \
            APPLE_NOTARY_ISSUER_ID
          do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required signing/notarization secrets:\n' >&2
            printf ' - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Import signing certificates
        id: signing
        env:
          APPLE_DEVELOPER_ID_APP_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERTIFICATE_BASE64 }}
          APPLE_DEVELOPER_ID_APP_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERTIFICATE_PASSWORD }}
          APPLE_DEVELOPER_ID_INSTALLER_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_CERTIFICATE_BASE64 }}
          APPLE_DEVELOPER_ID_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_CERTIFICATE_PASSWORD }}
          APPLE_NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/drift-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          APP_CERT_PATH="$RUNNER_TEMP/developer-id-application.p12"
          INSTALLER_CERT_PATH="$RUNNER_TEMP/developer-id-installer.p12"
          NOTARY_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"

          echo "$APPLE_DEVELOPER_ID_APP_CERTIFICATE_BASE64" | base64 --decode > "$APP_CERT_PATH"
          echo "$APPLE_DEVELOPER_ID_INSTALLER_CERTIFICATE_BASE64" | base64 --decode > "$INSTALLER_CERT_PATH"
          echo "$APPLE_NOTARY_KEY_BASE64" | base64 --decode > "$NOTARY_KEY_PATH"
          chmod 600 "$NOTARY_KEY_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$APP_CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_DEVELOPER_ID_APP_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security import "$INSTALLER_CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_DEVELOPER_ID_INSTALLER_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/pkgbuild
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v "$KEYCHAIN_PATH"

          echo "keychain_path=$KEYCHAIN_PATH" >> "$GITHUB_OUTPUT"
          echo "notary_key_path=$NOTARY_KEY_PATH" >> "$GITHUB_OUTPUT"

      - name: Build pkg
        env:
          VERSION: ${{ steps.metadata.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
          ARCH: arm64
          CODESIGN_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}
          INSTALLER_SIGN_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_IDENTITY }}
          KEYCHAIN_PATH: ${{ steps.signing.outputs.keychain_path }}
          NOTARIZE: "true"
          NOTARY_KEY_PATH: ${{ steps.signing.outputs.notary_key_path }}
          NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          chmod +x scripts/package-macos.sh
          scripts/package-macos.sh

      - name: Upload pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.pkg_name }}
          path: dist/${{ steps.metadata.outputs.pkg_name }}
          if-no-files-found: error

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.metadata.outputs.tag }}
          PKG_PATH: dist/${{ steps.metadata.outputs.pkg_name }}
        run: |
          set -euo pipefail

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$PKG_PATH" --clobber
          else
            gh release create "$TAG" "$PKG_PATH" \
              --target "$GITHUB_SHA" \
              --title "Drift $TAG" \
              --generate-notes
          fi
